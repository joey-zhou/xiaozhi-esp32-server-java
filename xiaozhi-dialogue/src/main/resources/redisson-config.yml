# Redisson 高级配置
# 仅用于分布式锁（CacheHelper）和布隆过滤器（BloomFilterManager），
# 普通 Redis 操作（缓存、Pub/Sub、设备注册）走 Lettuce 连接池。

# 连接超时时间 (毫秒)
connectTimeout: 10000

# 命令超时时间 (毫秒)
timeout: 3000

# 连接池大小
connectionPoolSize: 16

# 最小空闲连接数
connectionMinimumIdleSize: 4

# 订阅连接池大小（Redisson 内部心跳等用，不走 Pub/Sub 业务）
subscriptionConnectionPoolSize: 5

# 订阅连接最小空闲数
subscriptionConnectionMinimumIdleSize: 1

# DNS监控间隔 (毫秒)
dnsMonitoringInterval: 5000

# 编解码器（用于序列化）
codec: !<org.redisson.codec.JsonJacksonCodec> {}

# 线程池数量
threads: 16

# Netty线程池数量
nettyThreads: 32

# 传输模式
transportMode: "NIO"
