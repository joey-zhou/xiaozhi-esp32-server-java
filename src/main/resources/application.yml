# ============================================================
# 通用配置（所有环境共享）
# ============================================================

server:
  port: 8091

# ============================================================
# MyBatis 配置
# ============================================================
#mybatis:
#  mapper-locations: classpath*:com/xiaozhi/mapper/*.xml

# ============================================================
# 数据源配置
# ============================================================
spring:
#  main:
    # 启用懒加载 - Bean 在首次使用时才创建，显著加快启动速度
#    lazy-initialization: true
    # 允许 bean 定义覆盖
#    allow-bean-definition-overriding: true
    # 优化日志处理
#    log-startup-info: true

  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    name: XiaoZhiDataSource
    hikari:
      minimum-idle: 10
      maximum-pool-size: 100
      auto-commit: true
      idle-timeout: 300000
      pool-name: DatebookHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
      validation-timeout: 5000
      leak-detection-threshold: 60000
      keepalive-time: 30000
      register-mbeans: true
  # ============================================================
  # JPA / Hibernate 配置（Spring Boot 3.5.6 + Hibernate 6+ 高性能 API 服务）
  # ============================================================
  jpa:
    # 禁用 Open-In-View，避免懒加载问题和性能开销
    open-in-view: false
    # 生产环境建议关闭 SQL 日志，如需调试可开启
    show-sql: false
    # Hibernate 核心配置
    hibernate:
      # 生产环境：validate（验证表结构）；开发环境：update
      ddl-auto: validate
      # 【新增】命名策略：显式指定标准策略，确保驼峰转下划线行为一致（根据你的注释需求调整）
      # 如果你希望 deviceName -> device_name (推荐数据库规范)，使用 ImplicitNamingStrategyJpaCompliantImpl
      # 如果你希望 deviceName -> deviceName (保持原样)，使用 PhysicalNamingStrategyStandardImpl
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    properties:
      hibernate:
        # 【日志优化】生产环境关闭 format_sql，减少字符串格式化开销
        format_sql: false
        # 数据库方言（MariaDB 兼容 MySQL）
        dialect: org.hibernate.dialect.MariaDBDialect

        # 批处理优化（Hibernate 6+ 标准配置）
        jdbc:
          batch_size: 50
          batch_versioned_data: true
          time_zone: UTC
        order_inserts: true
        order_updates: true
        # 【新增】查询计划缓存，提升重复查询性能
        query:
          plan_cache_max_size: 2048
          plan_parameter_metadata_max_size: 128
          default_null_ordering: none
          plan_parameter_metadata_enabled: true
        # 【新增】默认空值排序策略，避免不同数据库行为不一致
        default_null_ordering: none

        # 缓存配置（API 服务建议禁用二级缓存，避免脏读）
        cache:
          use_second_level_cache: false
          use_query_cache: false
          # 【新增】若未来开启缓存，需指定区域工厂，此处先预留注释
          # region_factory: org.hibernate.cache.redis.RegionFactory
       # 【统计信息】生产环境关闭，避免内存和 CPU 消耗
        generate_statistics: false

        # 【新增】事务上下文中 JDBC 连接释放模式
        # on_close: 事务结束时释放（默认，适合大多数场景）
        # after_transaction: 事务提交后立即释放（更激进，适合长事务）
        connection:
          release_mode: after_transaction
        # 【新增】JPA 查询超时设置（单位秒），防止慢查询拖死线程
        # 需要在代码中配合 @QueryHint 或使用 Spring 的 @Transactional(timeout=...)
        # 这里设置一个全局默认值，例如 30 秒
        query_timeout: 30
        # 事务管理
        transaction:
          auto_flush_without_managed: false
        # ID 生成器优化（pooled 策略减少序列访问）
        id:
          generator:
            optimization_strategy: pooled
  # Redis 缓存配置
  cache:
    type: redis
    redis:
      enable-statistics: true
      time-to-live: 86400
      use-key-prefix: true
  data:
    redis:
      # Redis 服务器地址（Spring Data Redis 和 Redisson 自动共享此配置）
      host: localhost
      port: 6379
      database: 0
      # Redisson 高级配置文件（可选，用于连接池、超时等高级设置）
      redisson:
        config: classpath:redisson-config.yml
  # 禁用 Groovy 模板位置检查
  groovy:
    template:
      check-template-location: false

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 20480MB
      max-request-size: 20480MB

  # JMX 配置
  jmx:
    enabled: false

  # WebSocket 配置
  websocket:
    allowed-origins: '*'
  # Session 配置
  session:
    cookie:
      http-only: true
      secure: false
      same-site: lax
      path: /

  # 虚拟线程
  threads:
    virtual:
      enabled: false

  # 静态资源配置
  web:
    resources:
      add-mappings: true

  # 激活的配置文件（默认为开发环境）
  profiles:
    active: dev
  # 允许循环依赖（用于解决 authUtilsConfig -> sysUserServiceImpl -> authenticationServiceImpl -> securityConfig -> customUserDetailsService -> authUtilsConfig 的循环依赖）
  main:
    allow-circular-references: true

  # Neo4j 配置（公共部分）
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: 12345678

# ============================================================
# 日志配置
# ============================================================
logging:
  level:
    # 抑制 Spring Security UserDetailsService 警告
    org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsManagerConfigurer: ERROR
    # 抑制 Spring AI MCP Sampling 警告（无采样方法）
    org.springframework.ai.mcp.sampling.SyncMcpSamplingProvider: WARN
    # 抑制 Spring AI MCP Elicitation 警告（无 elicitation 方法）
    org.springframework.ai.mcp.elicitation.SyncMcpElicitationProvider: WARN
# 【重要补充】日志配置 (替代 spring.jpa.show-sql)
    # 【开发环境】开启 SQL 和参数绑定日志     # 【生产环境】建议调整为 INFO 或 WARN，只记录慢查询或错误
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# ============================================================
# SpringDoc OpenAPI 配置
# ============================================================
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    url: /v3/api-docs

# ============================================================
# JWT 配置
# ============================================================
jwt:
  # JWT 签名密钥（至少 32 位）
  secret: XiaoZhiESP32ServerSecretKey2026ABC
  # Token 有效期（毫秒）30 天 = 2592000000 毫秒
  expiration: 2592000000

# ============================================================
# 自定义配置
# ============================================================
# 是否定时关闭不活跃的会话（秒）
check:
  inactive:
    session: true
