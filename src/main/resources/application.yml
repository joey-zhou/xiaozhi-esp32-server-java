# ============================================================
# 通用配置（所有环境共享）
# ============================================================

server:
  port: 8091

# ============================================================
# MyBatis 配置
# ============================================================
#mybatis:
#  mapper-locations: classpath*:com/xiaozhi/mapper/*.xml

# ============================================================
# 数据源配置
# ============================================================
spring:
#  main:
    # 启用懒加载 - Bean 在首次使用时才创建，显著加快启动速度
#    lazy-initialization: true
    # 允许 bean 定义覆盖
#    allow-bean-definition-overriding: true
    # 优化日志处理
#    log-startup-info: true

  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    name: XiaoZhiDataSource
    hikari:
      minimum-idle: 10
      maximum-pool-size: 100
      auto-commit: true
      idle-timeout: 300000
      pool-name: DatebookHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
      validation-timeout: 5000
      leak-detection-threshold: 60000
      keepalive-time: 30000
      register-mbeans: true
  jpa:
    open-in-view: true
    show-sql: true
    # Hibernate 配置
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    properties:
      hibernate:
        # SQL 格式化
        format_sql: true
        show_sql: false
        # 方言配置（MariaDB/MySQL）
        dialect: org.hibernate.dialect.MariaDBDialect
        # 批处理配置
        jdbc:
          batch_size: 50
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
        # 二级缓存配置
        cache:
          use_second_level_cache: false
          use_query_cache: false
        # 统计信息
        generate_statistics: false
        # 连接释放模式
        connection:
          release_mode: after_transaction
        # 验证查询
        query:
          plan_cache_max_size: 2048
          default_null_ordering: none
  # Redis 缓存配置
  cache:
    type: redis

  data:
    redis:
      # Redis 服务器地址（Spring Data Redis 和 Redisson 自动共享此配置）
      host: localhost
      port: 6379
      database: 0
      # Redisson 高级配置文件（可选，用于连接池、超时等高级设置）
      redisson:
        config: classpath:redisson-config.yml

  # 禁用 Groovy 模板位置检查
  groovy:
    template:
      check-template-location: false

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 20480MB
      max-request-size: 20480MB

  # JMX 配置
  jmx:
    enabled: false

  # WebSocket 配置
  websocket:
    allowed-origins: '*'

  # Session 配置
  session:
    cookie:
      http-only: true
      secure: false
      same-site: lax
      path: /

  # 虚拟线程
  threads:
    virtual:
      enabled: false

  # 静态资源配置
  web:
    resources:
      add-mappings: true

  # 激活的配置文件（默认为开发环境）
  profiles:
    active: dev

  # Neo4j 配置（公共部分）
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: 12345678

# ============================================================
# 日志配置
# ============================================================


# ============================================================
# SpringDoc OpenAPI 配置
# ============================================================
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    url: /v3/api-docs

# ============================================================
# JWT 配置
# ============================================================
jwt:
  # JWT 签名密钥（至少 32 位）
  secret: XiaoZhiESP32ServerSecretKey2026ABC
  # Token 有效期（毫秒）30 天 = 2592000000 毫秒
  expiration: 2592000000

# ============================================================
# 自定义配置
# ============================================================
# 是否定时关闭不活跃的会话（秒）
check:
  inactive:
    session: true
