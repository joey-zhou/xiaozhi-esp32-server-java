# Redisson 高级配置

# 连接超时时间 (毫秒)
connectTimeout: 10000

# 命令超时时间 (毫秒)
timeout: 3000

# 连接池大小
connectionPoolSize: 64

# 最小空闲连接数
connectionMinimumIdleSize: 10

# 订阅连接池大小
subscriptionConnectionPoolSize: 50

# 订阅连接最小空闲数
subscriptionConnectionMinimumIdleSize: 1

# DNS 监控间隔 (毫秒)
dnsMonitoringInterval: 5000

# 编解码器（用于序列化）
codec: !<org.redisson.codec.JsonJacksonCodec> {}

# 线程池数量（默认：CPU 核心数 * 2，一般服务设置为 4-8 即可）
threads: 2

# Netty 线程池数量（默认：CPU 核心数 * 2，一般服务设置为 8-16 即可）
nettyThreads: 2

# 传输模式
transportMode: "NIO"
